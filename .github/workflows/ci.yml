name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24.18.0'
          cache: true
          run-install: false
      - run: vp install --frozen-lockfile
      - run: vp check
      - run: vp run test:unit
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage
          retention-days: 14
          if-no-files-found: ignore

  build:
    name: Build site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit
    steps:
      - uses: actions/checkout@v7
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24.18.0'
          cache: true
          run-install: false
      - run: vp install --frozen-lockfile
      - run: vp build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 7
          if-no-files-found: error

  html-validate:
    name: HTML validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24.18.0'
          cache: true
          run-install: false
      - run: vp install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - run: vp run lint:html

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24.18.0'
          cache: true
          run-install: false
      - run: vp install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - run: vp exec playwright install --with-deps chromium
      - run: vp exec playwright test --project=chromium --project=mobile-chrome

  ci:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [unit, build, html-validate, e2e]
    if: always()
    steps:
      - name: Verify required jobs
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          fail=0
          for job in unit build html-validate e2e; do
            result=$(echo "$NEEDS_JSON" | jq -r ".\"$job\".result")
            echo "$job -> $result"
            if [ "$result" != "success" ]; then fail=1; fi
          done
          exit $fail
